# Nginx config para friends-party-retro
# Copiar a /etc/nginx/sites-available/retro y enlazar con ln -s a sites-enabled/

upstream app {
    server 127.0.0.1:8080;
}

upstream netplay {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # --- App custom (auth + lobby + frontend) ---
    location / {
        proxy_pass http://app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Netplay server (socket.io via WebSocket) ---
    location /socket.io/ {
        proxy_pass http://netplay;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # --- Assets de EmulatorJS (core snes9x + data) ---
    location /data/ {
        alias /srv/retro/data/;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    location /cores/ {
        alias /srv/retro/cores/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # --- ROMs (se sirven desde Nginx, más eficiente que Node) ---
    location /roms/ {
        alias /srv/retro/roms/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- Headers para SharedArrayBuffer (multithreading en EmulatorJS) ---
    # Requerido para cores que usan multithread (PSP, etc.)
    # SNES no lo necesita pero no afecta y es bueno tenerlo.
    location /play/ {
        proxy_pass http://app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Para SharedArrayBuffer
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }
}