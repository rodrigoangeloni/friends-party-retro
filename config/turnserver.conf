# turnserver.conf para friends-party-retro
# Copiar a /etc/turnserver.conf en la OrangePi

# === Identidad ===
realm=retro.example.com
server-name=retro

# === Escucha ===
listening-port=3478
tls-listening-port=0
min-port=49152
max-port=49200

# === Auth de largo plazo (usuarios estáticos) ===
# Crear usuario con: turnadmin -a -u retro -p tu_secreto -r retro.example.com
# O usar credenciales dinámicas (más seguro)
use-auth-secret
static-auth-secret=GENERAR_CON_turnadmin --generate-secret

# Alternativa: usuario estático (sin use-auth-secret)
# lt-cred-mech
# user=retro:tu_secreto

# === Logging ===
log-file=/var/log/turnserver.log
verbose
simple-log

# === Red ===
fingerprint
lt-cred-mech
no-cli

# === Seguridad ===
no-multicast-peers
no-loopback-peers
no-cli

# === Relay ===
relay-ip=0.0.0.0
external-ip=IP_PUBLICA_DE_LA_ORANGEPI

# === Rendimiento (optimizado para 1GB RAM) ===
total-quota=100
stale-nonce=600
proc-quota=100
max-bps=0

# === Compatibilidad con WebRTC ===
no-tlsv1
no-tlsv1_1