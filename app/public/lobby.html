<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lobby - Friends Party Retro</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header id="topbar">
      <div class="brand-group">
        <a href="/" class="brand">Friends Party Retro</a>
      </div>
      <div class="user-group">
        <span>Hola, <span id="me-username" class="user-name"></span></span>
        <a href="/admin.html" id="admin-link" style="display:none;" class="btn small secondary">Admin</a>
        <button onclick="logout()" class="secondary small">Salir</button>
      </div>
    </header>

    <section>
      <h2 class="section-title">Elige un juego</h2>
      <div id="games-list" class="games-grid">
        <div class="empty-state">Cargando juegos...</div>
      </div>
    </section>

    <section id="rooms-section" class="rooms-section" style="display:none;">
      <h2 class="section-title">Salas de <span id="selected-game-name"></span></h2>

      <div class="rooms-layout">
        <div class="card">
          <h3>Crear sala nueva</h3>
          <form id="create-room-form">
            <input type="text" id="room-name" placeholder="Nombre de la sala" required>
            <label>
              Max jugadores
              <input type="number" id="max-players" min="1" max="4" value="2">
            </label>
            <input type="password" id="room-password" placeholder="Contrasena (opcional)">
            <button type="submit">Crear sala</button>
          </form>
          <p id="create-error" class="error"></p>
        </div>

        <div class="card">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
            <h3>Salas abiertas</h3>
            <button onclick="refreshRooms()" class="secondary small">Actualizar</button>
          </div>
          <div id="rooms-list">
            <div class="empty-state">No hay salas abiertas. Crea una!</div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/lobby.js"></script>
  <script>
    initLobby();
  </script>
</body>
</html>
