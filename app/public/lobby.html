<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lobby - Friends Party Retro</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header id="topbar">
      <div class="brand-group">
        <a href="/" class="brand">Friends Party Retro</a>
      </div>
      <div class="user-group">
        <span>Hola, <span id="me-username" class="user-name"></span></span>
        <a href="/admin.html" id="admin-link" style="display:none;" class="btn small secondary">Admin</a>
        <button onclick="logout()" class="secondary small">Salir</button>
      </div>
    </header>

    <section>
      <h2 class="section-title">Elige un juego</h2>
      <div id="games-list" class="games-grid">
        <div class="empty-state">Cargando juegos...</div>
      </div>
    </section>

    <div class="netplay-hint">
      <p>Para jugar con amigos:</p>
      <ol>
        <li>Elige un juego y haz click en <strong>JUGAR</strong>.</li>
        <li>En la barra del emulador, haz click en <strong>Netplay</strong>.</li>
        <li>Crea una sala o únete a una existente.</li>
        <li>Comparte el nombre de la sala con tu amigo.</li>
      </ol>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/lobby.js"></script>
  <script>
    initLobby();
  </script>
</body>
</html>
