<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>friends-party-retro</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <h1>friends-party-retro</h1>
    <p class="subtitle">Plataforma de juego online con emuladores</p>

    <div id="auth-section">
      <div class="card">
        <h2>Iniciar sesion</h2>
        <form id="login-form">
          <input type="text" id="login-username" placeholder="Usuario" autocomplete="username" required>
          <input type="password" id="login-password" placeholder="Contrasena" autocomplete="current-password" required>
          <button type="submit">Entrar</button>
        </form>
        <p id="login-error" class="error"></p>
      </div>

      <div class="card">
        <h2>Registrarse</h2>
        <form id="register-form">
          <input type="text" id="reg-username" placeholder="Usuario (3-20 chars alfanumericos)" autocomplete="username" required>
          <input type="password" id="reg-password" placeholder="Contrasena (min 4 chars)" autocomplete="new-password" required>
          <button type="submit">Crear cuenta</button>
        </form>
        <p id="reg-error" class="error"></p>
      </div>
    </div>

    <div id="logged-in" style="display:none;">
      <div class="card">
        <h2>Bienvenido, <span id="me-username"></span></h2>
        <button onclick="location.href='/lobby.html'">Ir al lobby</button>
        <button onclick="logout()" class="secondary">Cerrar sesion</button>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    checkAuth();
  </script>
</body>
</html>
